name: CI/CD Canary Deployment

on:
  push:
    branches: [ "main" ]
    # 트리거 동작 조건: main 핵심 브랜치에 코드가 Push(병합)되는 이벤트가 감지될 때마다 파이프라인 프로세스가 자동으로 기동되도록 선언합니다.

jobs:
  canary-deploy:
    # GitHub 클라우드 서버 인프라가 아닌, 앞서 구축한 '내 PC의 로컬 러너' 환경에서 직접 실행되도록 지정합니다.
    runs-on: self-hosted
    
    steps:
    - name: 📥 소스코드 형상 최신화 Checkout
      uses: actions/checkout@v3
      
    - name: 🐦 카나리 무중단 배포 쉘 스크립트 실행 명령 하달
      # GitHub 원격 저장소에 반영된 가장 최신의 소스코드를 러너 로컬 영역으로 체크아웃 복제한 후, 시스템 단에서 직접 스크립트를 호출합니다.
      run: bash ./deploy.sh

